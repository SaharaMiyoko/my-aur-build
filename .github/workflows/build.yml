$ mkdir -p /tmp/ayugram-workflow && cat > /tmp/ayugram-workflow/build-ayugram.yml << 'EOF'
name: Build ayugram-desktop

on:
  schedule:
    - cron: '0 2 * * 1'   # 每周一凌晨 2 点自动检查
  workflow_dispatch:        # 支持手动触发
  push:
    paths:
      - '.github/workflows/build-ayugram.yml'

jobs:
  build:
    runs-on: ubuntu-latest  # 免费版 7GB RAM，建议换 ubuntu-22.04-16core（付费）
    # 如果你有自托管 runner（内存够大），换成下面这行：
    # runs-on: self-hosted

    steps:
      - name: Maximize disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 32768     # 加 16GB swap 补偿内存不足
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in Arch Linux container
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/output:/output" \
            -e CMAKE_BUILD_PARALLEL_LEVEL=2 \
            archlinux:latest bash -c '
              set -euo pipefail

              # 初始化 keyring 并更新系统
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Syu --noconfirm --needed base-devel git

              # 创建非 root 编译用户（makepkg 拒绝以 root 运行）
              useradd -m -G wheel builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              # 克隆 AUR 包
              su builder -c "
                git clone https://aur.archlinux.org/ayugram-desktop.git /home/builder/ayugram-desktop
                cd /home/builder/ayugram-desktop

                # 安装依赖（--asdeps 标记为依赖，便于之后清理）
                makepkg --nobuild --noconfirm --syncdeps --rmdeps 2>&1 || true

                # 正式编译
                # CMAKE_BUILD_PARALLEL_LEVEL=2 限制并行数，防止 OOM
                # --nocheck 跳过测试，节省时间
                CMAKE_BUILD_PARALLEL_LEVEL=2 \
                TAR_OPTIONS=\"--no-xattrs\" \
                makepkg -s --noconfirm --nocheck --noprogressbar 2>&1
              "

              # 复制产物到宿主机
              cp /home/builder/ayugram-desktop/*.pkg.tar.zst /output/ 2>/dev/null || \
              cp /home/builder/ayugram-desktop/*.pkg.tar.xz  /output/ 2>/dev/null || true
            '

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayugram-desktop-pkg
          path: output/*.pkg.tar.*
          retention-days: 30
          if-no-files-found: error

      - name: Release to GitHub Releases
        uses: ncipollo/release-action@v1
        with:
          allowUpdates: true
          tag: "latest"
          name: "ayugram-desktop latest build"
          body: |
            自动构建于 ${{ github.run_id }}
            触发方式：${{ github.event_name }}
          artifacts: "output/*.pkg.tar.*"
          token: ${{ secrets.GITHUB_TOKEN }}
EOF
echo "Done"
