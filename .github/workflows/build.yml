name: Build ayugram-desktop

on:
  schedule:
    - cron: '0 2 * * 1'   # 每周一凌晨 2 点自动检查
  workflow_dispatch:        # 支持手动触发


jobs:
  build:
    runs-on: ubuntu-latest  # 免费版 7GB RAM，建议换 ubuntu-22.04-16core（付费）
    # 如果你有自托管 runner（内存够大），换成下面这行：
    # runs-on: self-hosted

    steps:
      - name: Maximize disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 16384     # 加 16GB swap 补偿内存不足
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Build ayugram-desktop
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/build \
            -w /build \
            greyltc/archlinux-aur:paru \
            bash -c '
              set -e
              pacman -Syu --noconfirm
              
              # 创建 builder 用户（makepkg 必须非 root）
              useradd -m builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" > /etc/sudoers.d/builder
              
              # 复制 PKGBUILD 等文件
              cp -r /build/* /home/builder/ || true
              cd /home/builder
              chown -R builder:builder .
              
              su builder -c "
                makepkg -si --noconfirm --syncdeps
              "
              
              # 把生成的包复制出来
              cp *.pkg.tar.zst /build/
            '

      - name: Upload package
        uses: actions/upload-artifact@v4
        with:
          name: ayugram-desktop-package
          path: "*.pkg.tar.zst"
          retention-days: 30
