name: Build ayugram-desktop

on:
  schedule:
    - cron: '0 2 * * 1'   # 每周一凌晨 2 点自动检查
  workflow_dispatch:        # 支持手动触发


jobs:
  build:
    runs-on: ubuntu-latest  # 免费版 7GB RAM，建议换 ubuntu-22.04-16core（付费）
    # 如果你有自托管 runner（内存够大），换成下面这行：
    # runs-on: self-hosted

    steps:
      - name: Maximize disk space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 4096
          swap-size-mb: 8192     # 加 16GB swap 补偿内存不足
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout
        uses: actions/checkout@v4
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true     # 释放约 6GB
          android: true        # 释放约 8GB
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - name: Free Extra space
        run: |
          sudo rm -rf /usr/share/swift
          sudo rm -rf /usr/local/share/chromium
          sudo rm -rf /opt/hostedtoolcache
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo docker system prune -af
          df -h  # 看一下剩余空间


      - name: Build in Arch Linux container
        run: |
          docker run --rm --privileged \
            -v "${{ github.workspace }}/output:/output" \
            -e MAKEPKG_AYUGRAM_API_ID \
            -e MAKEPKG_AYUGRAM_API_HASH \
            -e CMAKE_BUILD_PARALLEL_LEVEL=2 \
            archlinux:latest bash -c '
              set -euo pipefail
              set -e

              # 初始化 keyring 并更新系统
              pacman-key --init
              pacman-key --populate archlinux
              pacman -Syu --noconfirm --needed base-devel git

              # 创建非 root 编译用户（makepkg 拒绝以 root 运行）
              useradd -m -G wheel builder
              echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers

              # 克隆 AUR 包
              su builder -c "
                git clone https://aur.archlinux.org/ayugram-desktop.git /home/builder/ayugram-desktop
                cd /home/builder/ayugram-desktop

                # 安装依赖（--asdeps 标记为依赖，便于之后清理）
                makepkg --nobuild --noconfirm --syncdeps --rmdeps 2>&1 || true

                # 正式编译
                # CMAKE_BUILD_PARALLEL_LEVEL=2 限制并行数，防止 OOM
                # --nocheck 跳过测试，节省时间
                CMAKE_BUILD_PARALLEL_LEVEL=2 \
                TAR_OPTIONS=\"--no-xattrs\" \
                makepkg -s --noconfirm --nocheck --noprogressbar 2>&1
              "

              # 复制产物到宿主机
              cp /home/builder/ayugram-desktop/*.pkg.tar.zst /output/ 2>/dev/null || \
              cp /home/builder/ayugram-desktop/*.pkg.tar.xz  /output/ 2>/dev/null || true
            '

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayugram-desktop-pkg
          path: output/*.pkg.tar.*
          retention-days: 30
          if-no-files-found: error

