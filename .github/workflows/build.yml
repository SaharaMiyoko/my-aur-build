name: BUILD AUR

on:
  workflow_dispatch: 
  push:
    branches:
      - master


jobs:
  build:
    strategy:
      matrix:
        repos: [ayugram-desktop]
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - uses: DuckSoft/build-aur-action@master
        with:
          repo-name: ${{ matrix.repos }}
      - uses: actions/upload-artifact@v4
        with:
          name: built-packages
          path: ./*/*.pkg.tar.zst
